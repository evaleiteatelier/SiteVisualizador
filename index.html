<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eva Leite Atelier</title>

    <!-- Tailwind CSS para o design e responsividade -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#f4f4f6',
                        marca: '#1a1a1a'
                    },
                    fontFamily: {
                        sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Pequenos ajustes para animações suaves */
        .produto-card:hover img {
            transform: scale(1.05);
        }

        .produto-card img {
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body class="bg-fundo text-marca min-h-screen flex flex-col">

    <!-- Cabeçalho com a Logo -->
    <header
        class="w-full py-8 flex justify-center items-center shadow-sm bg-fundo/90 sticky top-0 z-50 backdrop-blur-sm">
        <div class="text-center">
            <!-- Certifique-se de que a imagem está na mesma pasta que o index.html -->
            <img src="logo.png" alt="Eva Leite Atelier Logo" class="h-24 md:h-32 object-contain mix-blend-multiply">
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl">

        <div class="mb-8 text-center">
            <h1 class="text-2xl font-light tracking-widest uppercase">A nossa coleção</h1>
            <p class="text-gray-500 mt-2">Clique no produto para comprar diretamente na Vinted.</p>
        </div>

        <!-- Estado de Carregamento -->
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-marca"></div>
        </div>

        <!-- Mensagem de Erro (escondida por defeito) -->
        <div id="error-message" class="hidden text-center text-red-500 py-10">
            <p>Ocorreu um erro ao carregar os produtos. Por favor, tente novamente mais tarde.</p>
        </div>

        <!-- Grelha de Produtos -->
        <div id="grelha-produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            <!-- Os produtos serão injetados aqui via JavaScript -->
        </div>

    </main>

    <!-- Rodapé -->
    <footer class="w-full py-6 text-center text-sm text-gray-500 mt-auto">
        <p>&copy; <span id="ano-atual"></span> Eva Leite Atelier. Todos os direitos reservados.</p>
    </footer>

    <!-- Lógica JavaScript / Supabase -->
    <script>
        // Atualizar ano do rodapé
        document.getElementById('ano-atual').textContent = new Date().getFullYear();

        // 1. Configurar o Cliente Supabase
        const supabaseUrl = 'https://bqjqwuphjvbmxjfcezos.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxanF3dXBoanZibXhqZmNlem9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTI1NjQsImV4cCI6MjA4OTU4ODU2NH0.manlyhsYXxUTK-llwa174wmhQ0HSVtuHTK387jiEMNk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Função para carregar os produtos
        async function carregarProdutos() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const grelhaEl = document.getElementById('grelha-produtos');

            try {
                // Vai buscar os dados à tabela 'produtos' no Supabase
                const { data: produtos, error } = await supabase
                    .from('produtos')
                    .select('*')
                    .order('created_at', { ascending: false }); // Mostra os mais recentes primeiro

                if (error) throw error;

                // Esconde o loading
                loadingEl.classList.add('hidden');

                if (produtos && produtos.length > 0) {
                    grelhaEl.classList.remove('hidden');

                    // Constrói o HTML para cada produto
                    produtos.forEach(produto => {
                        // Formatação do preço (ex: 15.00 -> 15,00 €)
                        const precoFormatado = produto.preco ?
                            new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(produto.preco) :
                            '';

                        const cardHTML = `
                            <div class="produto-card bg-white p-4 rounded-lg shadow-sm hover:shadow-md transition-shadow duration-300 flex flex-col h-full border border-gray-100">
                                <a href="${produto.vinted_url}" target="_blank" rel="noopener noreferrer" class="block overflow-hidden rounded mb-4 aspect-[3/4] bg-gray-50 relative group">
                                    <img src="${produto.imagem_url}" alt="${produto.nome}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                                </a>
                                
                                <div class="flex-grow flex flex-col">
                                    <h2 class="text-lg font-medium text-gray-900 mb-1 truncate" title="${produto.nome}">${produto.nome}</h2>
                                    ${produto.descricao ? `<p class="text-sm text-gray-500 mb-4 line-clamp-2">${produto.descricao}</p>` : ''}
                                    
                                    <div class="mt-auto flex items-center justify-between pt-4">
                                        <span class="font-semibold text-lg">${precoFormatado}</span>
                                        <a href="${produto.vinted_url}" target="_blank" rel="noopener noreferrer" 
                                           class="bg-marca text-white px-4 py-2 text-sm uppercase tracking-wider rounded hover:bg-gray-800 transition-colors">
                                            Ver na Vinted
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                        grelhaEl.innerHTML += cardHTML;
                    });
                } else {
                    // Se não houver produtos na base de dados
                    grelhaEl.classList.remove('hidden');
                    grelhaEl.innerHTML = `
                        <div class="col-span-full text-center py-10 text-gray-500">
                            Neste momento não temos produtos disponíveis. Volte em breve!
                        </div>
                    `;
                    grelhaEl.classList.remove('grid', 'grid-cols-1', 'sm:grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4');
                }

            } catch (error) {
                console.error('Erro ao buscar produtos:', error.message);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // Executar a função quando a página carregar
        document.addEventListener('DOMContentLoaded', carregarProdutos);
    </script>
</body>

</html>
